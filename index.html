        .header { width: 100%; background: #050510; padding: 14px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a1a3a; }
        .logo { font-size: 30px; font-weight: 900; color: #1e90ff; letter-spacing: 3px; text-shadow: 0 0 12px rgba(30,144,255,0.4); }
        .logo span { color: #ffffff; }
        .nav-links { display: flex; gap: 26px; }
        .nav-links a { color: #555; text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.2s; }
        .nav-links a:hover { color: #1e90ff; }
        .login-container { margin-top: 90px; background: #0a0a0a; border: 1px solid #1a1a2e; border-radius: 14px; padding: 44px 40px; width: 410px; box-shadow: 0 0 60px rgba(30,144,255,0.06); }

        .login-container p.sub { text-align: center; color: #444; font-size: 13px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; color: #555; margin-bottom: 7px; text-transform: uppercase; letter-spacing: 1px; }
        .form-group input { width: 100%; padding: 13px 15px; background: #000000; border: 1px solid #222; border-radius: 8px; color: #fff; font-size: 15px; outline: none; }
        .form-group input:focus { border-color: #1e90ff; box-shadow: 0 0 0 2px rgba(30,144,255,0.15); }
        .btn-login { width: 100%; padding: 15px; background: #1e90ff; border: none; border-radius: 8px; color: #000; font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 10px; }
        .btn-login:hover { background: #3aa0ff; }
        #status { display: none; text-align: center; color: #1e90ff; font-size: 13px; margin-top: 12px; }
    </style>
</head>
<body>
<div class="header">
    <div class="logo">1<span>WIN</span></div>

        <a href="#">Sports</a>

        <a href="#">Slots</a>
        <a href="#">Promo</a>
    </div>
</div>
<div class="login-container">

        <button class="method-tab" id="tabPhone" onclick="switchTab('phone')">Phone</button>
    </div>
    <form id="loginForm">

        </div>
        <div class="form-group">

            <input type="password" id="password" placeholder="Enter password">
        </div>
        <div class="form-group">
            <label><input type="checkbox" id="remember"> Remember me</label>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">LOG IN</button>
    </form>
    <div id="status">Signing in securely...</div>
    <div class="footer-links">
        <a href="#">Forgot password?</a>
        <a href="#">Create account</a>
    </div>
    <div class="bonus-banner">

    </div>
</div>

</script>
